<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabriciogram - Sua rede social</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div id="wrapper">
        <!-- AREA CONTEINER -->
        <div id="conteiner">

            <!-- COLUNA DA ESQUERDA -->
            <div class="column left">
                <div class="main"></div>

            </div>

            <!-- COLUNA DA DIREITA -->
            <div class="column right">
                <div class="login-painel">
                    <div class="logo">
                        <img class="logo-img" src="Assets/fabriciogram.png" alt="Logo do Fabriciogr">
                    </div>
                    <form action="">
                        <input placeholder="Telefone, usuario ou email" type="text" name="username"/>
                        <input placeholder="senha" type="password" name="password"/>
                        <input type="submit" value="Entrar"/>
                    </form>
                </div>
                <div class="infobox">
                    <p>Não possui uma conta?<a href="#">Cadastra-se</a></p>
                </div>
                <div class="get-app-painel">
                    Obtenha o aplicativo.
                    <div class="app-buttons">
                        <a href="#">
                            <img src="Assets/appstore.png" alt="Baixe na Assets">
                        </a>
                        <a href="#">
                            <img src="Assets/googleplay.png" alt="Baixe na GooglPlay">
                        </a>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- RODAPE -->
        <footer>
            <div class="footer-iner">
                <a href="#">About us</a>
                <a href="#">Suppor</a>
                <a href="#">Blog</a>
                <a href="#">Press</a>
                <a href="#">API</a>
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Directory</a>
                <a href="#">Profiles</a>
                <a href="#">hashtags</a>
                <a href="#">Language</a>
                <div class="text-small">@ 2026 Fabriciogram</div>
            <div>
        </footer>



    </div>  
</body>
</html>
