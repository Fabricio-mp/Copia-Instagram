<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabriciogram - Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div id="wrapper">
        <!-- AREA CONTEINER -->
        <div id="cadastro">

          

            <!-- COLUNA DA DIREITA -->
            <div class="column">
                <div class="cadastro-painel">
                    <div class="logo">
                        <img class="logo-img-cadastro" src="Assets/fabriciogram.png" alt="Logo do Fabriciogr">
                    </div>
                    <div class="message">
                        <span>Cadastra-se para ver fotos e vídeos dos seus amigos.</span>
                    </div>

                    <button class="cta-button">
                        Entrar com Facebook
                    </button>

                    <div class="Divisor">
                        <div class="line"></div>
                        <div class="divisor-tag">ou</div>
                        <div class="line"></div>

                    </div>

                    <form action="">
                        <input placeholder="Número de celular ou email" type="text" name="email"/>
                        <input placeholder="Nome completo" type="text" name="name"/>
                        <input placeholder="Username" type="text" name="username"/>
                        <input placeholder="senha" type="password" name="password"/>
                        <input type="submit" value="Entrar"/>
                    </form>

                    
                </div>
                <div class="infobox">
                    <p>Tem uma conta?<a href="index.html"> Conecte-se</a></p>
                </div>
                <div class="get-app-painel">
                    Obtenha o aplicativo.
                    <div class="app-buttons">
                        <a href="#">
                            <img src="Assets/appstore.png" alt="Baixe na Assets">
                        </a>
                        <a href="#">
                            <img src="Assets/googleplay.png" alt="Baixe na GooglPlay">
                        </a>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- RODAPE -->
        <footer>
            <div class="footer-cadastro">
                <a href="#">About us</a>
                <a href="#">Suppor</a>
                <a href="#">Blog</a>
                <a href="#">Press</a>
                <a href="#">API</a>
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Directory</a>
                <a href="#">Profiles</a>
                <a href="#">hashtags</a>
                <a href="#">Language</a>
                <div class="text-small">@ 2026 Fabriciogram</div>
            <div>
        </footer>



    </div>  
</body>
</html>
